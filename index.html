<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JAICLUB - Official</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
  overflow-x: hidden;
}

/* 🔥 Background Layer */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;

  background: url('https://imglink.cc/cdn/ExkjErkU2O.png') no-repeat center;
  background-size: cover;

  filter: blur(8px);
  transform: scale(1.1);

  z-index: -2;
}

/* 🔥 Dark Overlay */
body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: -1;
}

/* Container */
.container {
  padding: 20px;
  margin-top: 60px;
}

/* Logo */
.logo img {
  width: 140px;
  border-radius: 20px;
  box-shadow: 0 0 20px rgba(255,255,255,0.3);
}

/* Title */
h1 {
  font-size: 34px;
  margin: 10px 0;
}

/* Description */
p {
  font-size: 15px;
  opacity: 0.9;
}

/* Glow Text */
.glow-text {
  font-size: 18px;
  margin: 15px 0;
  color: #00ffcc;
}

/* Buttons */
.btn {
  display: block;
  width: 85%;
  margin: 12px auto;
  padding: 15px;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  color: white;
  cursor: pointer;
}

/* Register */
.register {
  background: linear-gradient(45deg, #00ffcc, #00ccff);
}

/* Telegram */
.telegram {
  background: linear-gradient(45deg, #0088cc, #005577);
}

/* Background Text */
.bg-text {
  position: fixed;
  bottom: 20px;
  width: 100%;
  font-size: 40px;
  color: rgba(255,255,255,0.05);
}

/* Scroll Smooth */
html {
  scroll-behavior: smooth;
}
</style>
</head>

<body>

<div class="container">

  <!-- Logo -->
  <div class="logo">
    <img src="https://imglink.cc/cdn/KOY2ZnIq2-.jpg">
  </div>

  <!-- Title -->
  <h1>JAICLUB</h1>

  <!-- Description -->
  <p>
  Join JAICLUB now and start earning money with exciting games.
  Fast withdrawal & daily bonuses available.
  </p>

  <!-- Highlight -->
  <div class="glow-text">
  💰 Earn Real Money Daily 💰
  </div>

  <!-- Register Button -->
  <a href="https://yourregisterlink.com">
    <button class="btn register">Register Now</button>
  </a>

  <!-- Telegram Button -->
  <a href="https://t.me/yourchannel">
    <button class="btn telegram">Join Telegram</button>
  </a>

  <!-- Telegram Text -->
  <p style="margin-top:15px; font-size:16px;">
  🌐 DAILY FREE GIFT CODE
  </p>

</div>

<!-- Light Background Branding -->
<div class="bg-text">JAICLUB • EARN MONEY • JAICLUB</div>

</body>
</html>
