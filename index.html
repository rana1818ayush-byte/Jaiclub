<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JAICLUB</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  text-align: center;
  background: #000;
}

/* 🔥 PERFECT BACKGROUND FIX */
.bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: url('https://imglink.cc/cdn/ExkjErkU2O.png') center/cover no-repeat;
  filter: blur(6px);
  transform: scale(1.1);
  z-index: -2;
}

.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  z-index: -1;
}

/* TOP BAR */
.topbar {
  display: flex;
  justify-content: space-between;
  padding: 15px;
}

.topbar button {
  padding: 8px 15px;
  border-radius: 20px;
  border: none;
  background: rgba(255,255,255,0.2);
  color: white;
}

/* CONTAINER */
.container {
  padding: 20px;
  margin-top: 20px;
}

/* LOGO */
.logo img {
  width: 120px;
  border-radius: 20px;
}

/* BUTTON */
.btn {
  display: block;
  width: 85%;
  margin: 10px auto;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 18px;
  color: white;
}

.register {
  background: linear-gradient(45deg, #00ffcc, #00ccff);
}

.telegram {
  background: linear-gradient(45deg, #0088cc, #005577);
}

/* 🔥 WIN BOX */
.win-box {
  margin-top: 20px;
  padding: 15px;
  background: rgba(255,255,255,0.08);
  border-radius: 15px;
  backdrop-filter: blur(10px);
}

/* LIST */
.win-item {
  margin: 5px 0;
  font-size: 15px;
  color: #00ffcc;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<!-- TOP BAR -->
<div class="topbar">
  <div>JAICLUB</div>
  <div>
    <button onclick="window.location.href='https://yourloginlink.com'">Login</button>
    <button onclick="window.location.href='https://yourregisterlink.com'">Register</button>
  </div>
</div>

<div class="container">

  <!-- LOGO -->
  <div class="logo">
    <img src="https://imglink.cc/cdn/KOY2ZnIq2-.jpg">
  </div>

  <h1>JAICLUB</h1>

  <p>Premium gaming platform with fast withdrawals and daily rewards.</p>

  <p style="color:#00ffcc;">💰 Earn Real Money Daily 💰</p>

  <a href="https://yourregisterlink.com">
    <button class="btn register">Register Now</button>
  </a>

  <a href="https://t.me/yourchannel">
    <button class="btn telegram">Join Telegram</button>
  </a>

  <p>🌐 DAILY FREE GIFT CODE</p>

  <!-- 🔥 WIN BOX -->
  <div class="win-box">
    <h3>🔥 Live Winning</h3>
    <div id="winList"></div>
  </div>

</div>

<!-- 🔥 SCRIPT -->
<script>
function randomName() {
  let letters = "abcdefghijklmnopqrstuvwxyz";
  let first = letters[Math.floor(Math.random() * letters.length)];
  let last = Math.floor(Math.random() * 9);
  return first + "******" + last;
}

function randomAmount() {
  return Math.floor(Math.random() * 9000) + 500;
}

function updateWins() {
  let html = "";
  for (let i = 0; i < 5; i++) {
    html += "<div class='win-item'>" +
      randomName() + " won ₹" + randomAmount() +
      "</div>";
  }
  document.getElementById("winList").innerHTML = html;
}

setInterval(updateWins, 3000);
updateWins();
</script>

</body>
</html>
