<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>91 Club - Official</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  color: white;

  background: linear-gradient(rgba(255,0,0,0.8), rgba(0,0,0,0.9)),
              url('https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da');
  background-size: cover;
}

/* Top bar */
.topbar {
  display: flex;
  justify-content: space-between;
  padding: 10px;
}

.topbar button {
  padding: 8px 15px;
  border: none;
  border-radius: 20px;
  background: rgba(255,255,255,0.2);
  color: white;
}

/* Logo */
.logo {
  margin-top: 40px;
}

.logo img {
  width: 120px;
  border-radius: 20px;
}

/* Text */
h1 {
  margin: 10px 0;
}

p {
  padding: 0 20px;
  font-size: 14px;
}

/* Bonus text */
.bonus {
  color: yellow;
  font-size: 22px;
  font-weight: bold;
  margin: 20px 0;
}

/* Button */
.btn {
  background: green;
  color: white;
  padding: 15px 30px;
  border: none;
  border-radius: 10px;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="topbar">
  <div>91 CLUB</div>
  <div>
    <button onclick="window.location.href='https://yourloginlink.com'">Log in</button>
  </div>
</div>

<div class="logo">
  <img src="logo.png">
</div>

<h1>91 Club</h1>

<p>
Welcome to 91 Club Game. Login or Register Now and Play various games 
to make money like Color Prediction, WinGo, Aviator and more.
</p>

<div class="bonus">
Register Now & Get Rs.500 Bonus
</div>

<a href="https://yourregisterlink.com">
  <button class="btn">Register Now</button>
</a>

</body>
</html>
