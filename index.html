<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JAICLUB - Official</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  color: white;
  overflow: hidden;

  background: radial-gradient(circle at center, #1a1a2e, #000);
}

/* Glow background text */
.bg-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 60px;
  color: rgba(255,255,255,0.05);
  white-space: nowrap;
  z-index: 0;
}

/* Floating glow */
.glow {
  position: absolute;
  width: 200px;
  height: 200px;
  background: purple;
  filter: blur(120px);
  top: 20%;
  left: 10%;
}

/* Logo */
.logo {
  margin-top: 60px;
  position: relative;
  z-index: 2;
}

.logo img {
  width: 140px;
  border-radius: 20px;
}

/* Title */
h1 {
  margin: 10px 0;
  font-size: 30px;
}

/* Description */
p {
  padding: 0 20px;
  font-size: 14px;
  opacity: 0.8;
}

/* Bonus text */
.bonus {
  color: #00ffcc;
  font-size: 22px;
  font-weight: bold;
  margin: 20px 0;
}

/* Button */
.btn {
  display: block;
  width: 80%;
  margin: 10px auto;
  padding: 15px;
  border: none;
  border-radius: 12px;
  font-size: 18px;
  color: white;
}

/* Register */
.register {
  background: linear-gradient(45deg, #00ffcc, #00ccff);
}

/* Telegram */
.telegram {
  background: linear-gradient(45deg, #0088cc, #005577);
}
</style>
</head>

<body>

<div class="bg-text">JAICLUB • EARN MONEY • JAICLUB</div>
<div class="glow"></div>

<div class="logo">
  <img src="logo.png">
</div>

<h1>JAICLUB</h1>

<p>
Join JAICLUB now and start earning with exciting games. Fast withdrawals, daily bonuses and 24x7 support available.
</p>

<div class="bonus">
💰 Earn Real Money Daily 💰
</div>

<!-- Register Button -->
<a href="https://yourregisterlink.com">
  <button class="btn register">Register Now</button>
</a>

<!-- Telegram Button -->
<a href="https://t.me/yourchannel">
  <button class="btn telegram">Join Telegram</button>
</a>

<p style="margin-top:15px; font-size:16px;">
🌐 DAILY FREE GIFT CODE
</p>

</body>
</html>
